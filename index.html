<!DOCTYPE html>
<html>

<head>
    <title>Browser Homepage</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="background">
        <div class="gloss">
            <p id="time">00:00:00</p>
            <p id="weather">0% 0ºC 0KPH</p>
        </div>
        <div class="pokesearch">
            <p id="poketitle">PokéSearch</p>
            <div id="pokeinput-row">
                <input type="text" id="pokeinput" placeholder="e.g. pikachu" />
                <button id="pokebtn">Search</button>
            </div>
            <div id="pokenresult"></div>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>

</html>
